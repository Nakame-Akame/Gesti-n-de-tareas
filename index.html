<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Tareas</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🚀 Gestión de Tareas</h1>

    <button id="theme-toggle" class="theme-btn">
      🌙 Tema Oscuro
    </button>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">

    <div class="card">
      <h3>Total de tareas</h3>
      <p id="total-tasks">0</p>
    </div>

    <div class="card">
      <h3>Progreso</h3>
      <p id="progress">0%</p>
    </div>

    <div class="card urgent">
      <h3>Tareas urgentes</h3>
      <p id="urgent-count">0</p>
    </div>

  </section>

  <!-- FORMULARIO -->
  <section class="form-section">

    <form id="task-form">

      <input
        type="text"
        id="task-input"
        placeholder="Escribe una tarea..."
        required
      />

      <select id="priority-select">

        <option value="Alta">
          🔴 Alta
        </option>

        <option value="Media">
          🟡 Media
        </option>

        <option value="Baja">
          🟢 Baja
        </option>

      </select>

      <button type="submit">
        ➕ Agregar
      </button>

    </form>

  </section>

  <!-- BUSCADOR -->
  <section class="search-section">

    <input
      type="text"
      id="search-input"
      placeholder="🔎 Buscar tareas..."
    />

  </section>

  <!-- FILTROS -->
  <section class="filters">

    <button data-filter="all" class="filter-btn active">
      Todas
    </button>

    <button data-filter="pending" class="filter-btn">
      Pendientes
    </button>

    <button data-filter="completed" class="filter-btn">
      Completadas
    </button>

  </section>

  <!-- LISTA DE TAREAS -->
  <main>

    <ul id="task-list" class="task-list">

      <!-- TAREAS DINÁMICAS -->

      <!-- EJEMPLO -->
      <!--
      <li class="task-item">

        <div class="task-info">

          <h3 class="task-title">
            Estudiar JavaScript
          </h3>

          <span class="priority high">
            Alta
          </span>

        </div>

        <div class="task-actions">

          <button class="complete-btn">
            ✅
          </button>

          <button class="delete-btn">
            🗑
          </button>

        </div>

      </li>
      -->

    </ul>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>
      © 2026 - Aplicación de Gestión de Tareas
    </p>
  </footer>

  <!-- SCRIPTS -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
