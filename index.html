<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta
    name="description"
    content="TaskFlow - Aplicación moderna de gestión de tareas."
  />

  <meta
    name="keywords"
    content="ToDo, tareas, productividad, task manager"
  />

  <meta
    name="author"
    content="TaskFlow Team"
  />

  <!-- TÍTULO -->
  <title>TaskFlow — Gestión de Tareas</title>

  <!-- FAVICON -->
  <link
    rel="icon"
    type="image/x-icon"
    href="taskflow/img/libreto.ico"
  />

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="taskflow/css/style.css"
  />

</head>

<body>

  <!-- APP -->
  <main class="app">

    <!-- HEADER -->
    <header class="header">

      <div class="logo">

        <div class="logo-icon">
          ✦
        </div>

        <h1>
          Task<span>Flow</span>
        </h1>

      </div>

      <button
        class="theme-btn"
        id="themeBtn"
        title="Cambiar tema"
        aria-label="Cambiar tema"
      >
        🌙
      </button>

    </header>

    <!-- DASHBOARD -->
    <section class="stats">

      <!-- TOTAL -->
      <article class="stat-card">

        <div class="stat-label">
          Total
        </div>

        <div
          class="stat-value"
          id="statTotal"
        >
          0
        </div>

      </article>

      <!-- COMPLETADAS -->
      <article class="stat-card">

        <div class="stat-label">
          Completadas
        </div>

        <div
          class="stat-value accent"
          id="statDone"
        >
          0
        </div>

      </article>

      <!-- URGENTES -->
      <article class="stat-card">

        <div class="stat-label">
          🔴 Urgentes
        </div>

        <div
          class="stat-value danger"
          id="statHigh"
        >
          0
        </div>

      </article>

    </section>

    <!-- PROGRESS -->
    <section class="progress-bar-wrap">

      <div class="progress-bar-header">

        <strong id="progressLabel">
          Progreso
        </strong>

        <span id="progressPct">
          0% completado
        </span>

      </div>

      <div class="progress-track">

        <div
          class="progress-fill"
          id="progressFill"
          style="width: 0%;"
        ></div>

      </div>

    </section>

    <!-- FORM -->
    <section class="input-area">

      <input
        type="text"
        id="taskInput"
        placeholder="¿Qué necesitas hacer hoy?"
        maxlength="120"
        autocomplete="off"
      />

      <select
        class="priority-select"
        id="prioritySelect"
      >

        <option value="alta">
          🔴 Alta
        </option>

        <option value="media" selected>
          🟡 Media
        </option>

        <option value="baja">
          🟢 Baja
        </option>

      </select>

      <button
        class="add-btn"
        id="addBtn"
      >
        + Agregar
      </button>

    </section>

    <!-- CONTROLES -->
    <section class="controls">

      <!-- SEARCH -->
      <div class="search-wrap">

        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>

        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Buscar tareas..."
        />

      </div>

      <!-- FILTERS -->
      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="todas"
        >
          Todas
        </button>

        <button
          class="filter-btn"
          data-filter="pendientes"
        >
          Pendientes
        </button>

        <button
          class="filter-btn"
          data-filter="completadas"
        >
          Completadas
        </button>

      </div>

    </section>

    <!-- TASK COUNTER -->
    <div
      class="task-count"
      id="taskCount"
    >
      0 tareas
    </div>

    <!-- TASK LIST -->
    <section
      class="task-list"
      id="taskList"
    >

      <!-- TAREAS DINÁMICAS -->

    </section>

    <!-- EMPTY STATE -->
    <section
      class="empty-state"
      id="emptyState"
    >

      <div class="icon">
        📝
      </div>

      <p>
        No hay tareas todavía.<br>
        Agrega una nueva tarea para comenzar.
      </p>

    </section>

  </main>

  <!-- JAVASCRIPT -->
  <script src="taskflow/js/app.js"></script>

</body>
</html>
