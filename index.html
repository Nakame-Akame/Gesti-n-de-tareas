<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TaskFlow - Gestión de Tareas</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <header>

      <div class="logo">

        <div class="logo-icon">
          ✓
        </div>

        <h1>
          Task<span>Flow</span>
        </h1>

      </div>

      <button
        id="themeToggle"
        class="theme-btn"
        aria-label="Cambiar tema"
      >
        🌙
      </button>

    </header>

    <!-- ESTADÍSTICAS -->
    <section class="stats">

      <article class="stat-card">

        <p class="stat-label">
          Total tareas
        </p>

        <h2
          class="stat-value accent"
          id="totalTasks"
        >
          0
        </h2>

      </article>

      <article class="stat-card">

        <p class="stat-label">
          Completadas
        </p>

        <h2
          class="stat-value"
          id="completedTasks"
        >
          0
        </h2>

      </article>

      <article class="stat-card">

        <p class="stat-label">
          Prioridad alta
        </p>

        <h2
          class="stat-value danger"
          id="urgentTasks"
        >
          0
        </h2>

      </article>

    </section>

    <!-- BARRA DE PROGRESO -->
    <section class="progress-bar-wrap">

      <div class="progress-bar-header">

        <span>
          Progreso general
        </span>

        <strong id="progressText">
          0%
        </strong>

      </div>

      <div class="progress-track">

        <div
          class="progress-fill"
          id="progressFill"
          style="width: 0%;"
        ></div>

      </div>

    </section>

    <!-- FORMULARIO -->
    <section class="input-area">

      <input
        type="text"
        id="taskInput"
        placeholder="Escribe una nueva tarea..."
      />

      <select
        id="prioritySelect"
        class="priority-select"
      >

        <option value="Alta">
          🔴 Alta
        </option>

        <option value="Media">
          🟡 Media
        </option>

        <option value="Baja">
          🟢 Baja
        </option>

      </select>

      <button
        id="addTaskBtn"
        class="add-btn"
      >
        + Agregar
      </button>

    </section>

    <!-- CONTROLES -->
    <section class="controls">

      <!-- BUSCADOR -->
      <div class="search-wrap">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>

        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar tareas..."
        />

      </div>

      <!-- FILTROS -->
      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          Todas
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pendientes
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completadas
        </button>

      </div>

    </section>

    <!-- CONTADOR -->
    <p
      class="task-count"
      id="taskCount"
    >
      0 tareas
    </p>

    <!-- LISTA DE TAREAS -->
    <section
      class="task-list"
      id="taskList"
    >

      <!-- EJEMPLO DE TAREA -->

      <!--
      <article class="task-item">

        <button class="task-check">
          ✓
        </button>

        <div class="task-body">

          <h3 class="task-name">
            Estudiar JavaScript DOM
          </h3>

          <p class="task-date">
            Creada hoy
          </p>

        </div>

        <span class="priority-badge badge-alta">
          Alta
        </span>

        <button class="delete-btn">
          ✕
        </button>

      </article>
      -->

    </section>

    <!-- EMPTY STATE -->
    <section
      class="empty-state"
      id="emptyState"
    >

      <div class="icon">
        📝
      </div>

      <p>
        No tienes tareas aún.<br>
        Agrega una nueva tarea para comenzar.
      </p>

    </section>

  </div>

  <!-- JAVASCRIPT -->
  <script src="app.js"></script>

</body>
</html>
