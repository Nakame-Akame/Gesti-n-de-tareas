<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta name="description" content="TaskFlow - Aplicación moderna de gestión de tareas." />
  <meta name="keywords" content="ToDo, tareas, productividad, task manager" />
  <meta name="author" content="TaskFlow Team" />
  <meta name="theme-color" content="#7c6af7" />

  <title>TaskFlow — Gestión de Tareas</title>

  <!-- FAVICON (.ico correcto) -->
  <link rel="icon" type="image/x-icon" href="taskflow/img/libreto.ico" />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="taskflow/css/style.css" />
</head>

<body>

  <!-- APP -->
  <main class="app" id="app">

    <!-- HEADER -->
    <header class="header">

      <div class="logo" aria-label="TaskFlow logo">

        <div class="logo-icon" aria-hidden="true">
          ✦
        </div>

        <h1>
          Task<span>Flow</span>
        </h1>

      </div>

      <button
        class="theme-btn"
        id="themeBtn"
        aria-label="Cambiar tema"
      >
        🌙
      </button>

    </header>

    <!-- DASHBOARD -->
    <section class="stats" aria-label="Estadísticas">

      <article class="stat-card">
        <span class="stat-label">Total</span>
        <strong class="stat-value" id="statTotal">0</strong>
      </article>

      <article class="stat-card">
        <span class="stat-label">Completadas</span>
        <strong class="stat-value accent" id="statDone">0</strong>
      </article>

      <article class="stat-card">
        <span class="stat-label">Urgentes</span>
        <strong class="stat-value danger" id="statHigh">0</strong>
      </article>

    </section>

    <!-- PROGRESS -->
    <section class="progress-bar-wrap" aria-label="Progreso de tareas">

      <div class="progress-bar-header">
        <strong>Progreso</strong>
        <span id="progressPct">0%</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </section>

    <!-- INPUT -->
    <section class="input-area" aria-label="Agregar tarea">

      <input
        type="text"
        id="taskInput"
        placeholder="Escribe una tarea..."
        maxlength="120"
        autocomplete="off"
      />

      <select id="prioritySelect" class="priority-select">
        <option value="alta">🔴 Alta</option>
        <option value="media" selected>🟡 Media</option>
        <option value="baja">🟢 Baja</option>
      </select>

      <button id="addBtn" class="add-btn">
        + Agregar
      </button>

    </section>

    <!-- CONTROLS -->
    <section class="controls" aria-label="Buscar y filtrar">

      <div class="search-wrap">

        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Buscar tareas..."
        />

      </div>

      <div class="filters">

        <button class="filter-btn active" data-filter="todas">
          Todas
        </button>

        <button class="filter-btn" data-filter="pendientes">
          Pendientes
        </button>

        <button class="filter-btn" data-filter="completadas">
          Completadas
        </button>

      </div>

    </section>

    <!-- COUNTER -->
    <div class="task-count" id="taskCount">
      0 tareas
    </div>

    <!-- TASK LIST -->
    <section
      class="task-list"
      id="taskList"
      aria-live="polite"
    ></section>

    <!-- EMPTY STATE -->
    <section class="empty-state" id="emptyState">

      <div class="icon">📝</div>

      <p>
        No hay tareas todavía.<br />
        Agrega una nueva para comenzar.
      </p>

    </section>

  </main>

  <!-- SCRIPT -->
  <script src="taskflow/js/app.js" defer></script>

</body>
</html>
